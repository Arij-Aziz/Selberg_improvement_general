      models:
        - "Aristotle (primary)"
        - "gpt-5.4"
        - "gemini-3.1-pro"
        - "sonar"
        - "codex"
      framework: "Human-AI collaboration; Perplexity (Aristotle) as primary agent"
      tool_setup: >
        Lean 4 + Mathlib v4.28.0. Codex used for spot-checking only.
        All theorem statements and proof strategies decided by human author.
        AI assistance used for tactic search, proof elaboration, and
        infrastructure lemmas.
      cost:
        wall_time: "3 days"
        spend_usd: "$15"
        hardware: "API-only"
      prompting_notes: >
        Mathematical direction, theorem statements, novelty identification,
        and scope decisions were made by the human author. AI was used for
        tactic search and elaboration. All mathematical claims were verified
        by the human author via lake build and #print axioms.
  spend_usd: "$15"
  notes: >
    Human–AI collaboration. The human author drove all mathematical decisions.
    AI models assisted with proof search and infrastructure. Final verification
    done via lake build and Audit.lean (#print axioms). One sorry is present
    and documented; all 19 Statements.lean theorems typecheck without sorry.

fidelity:
  divergences: >
    (1) The general optimal-weight identity Q(λ_opt) = 1/V(D) for arbitrary g
    and D carries one sorry (deferred Möbius inversion). The Möbius-weight
    case is fully proved. This is a formalization gap only; the mathematics
    is standard (IK eq. 6.70).
    (2) The correlation-enhanced additive energy lower bound
    (correlation_additive_energy_lower) applies to StrongPseudorandomMajorant,
    an abstract structure. Instantiation for multiPrimeMajorant requires
    computing Σ_x ν(x)ν(x+h) explicitly and is a separate project.
    (3) The blueprint C1 correlation bound for the squared majorant ν at all
    shifts is false and machine-disproved. The correct result (Theorem C) is
    for the unsquared weight at coprime shifts only.
    (4) No asymptotic results, no density estimates, no big-O.
    (5) The Future/ directory contains scaffolding not part of the proof chain
    and excluded from the axiom audit.
    (6) The Weights/ infrastructure (SelbergWeights structure, sieveWeight,
    quadraticMajorantSum) generalizes the single-prime Step 1 machinery;
    several Step 1 lemmas (siftedSet_card_le_quadraticSum,
    weighted_remainder_bound) are reused here without re-statement.

review:
  status: "agent-reviewed, self-assessed"
  reviewers:
    - "Arij Aziz (author)"
    - "Aristotle (AI agent)"
    - "Codex (AI agent)"
  notes: >
    All 19 new theorems verified via #print axioms in RequestProject/Audit.lean.
    Axiom footprint confirmed as [propext, Classical.choice, Quot.sound] for
    every sorry-free result. One sorry (optimalWeight_quadForm_eq) is present
    and documented in the file header and Sorry Status section of the README.
    All 19 Statements.lean theorem signatures typecheck with zero errors
    (only declaration uses sorry warnings, intended).
    lake build passes cleanly on leanprover/lean4:v4.28.0 + Mathlib v4.28.0.
    Pending human peer review.

