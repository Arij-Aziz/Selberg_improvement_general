# formalization.yaml (v0.3)
version: "v0.3"

project:
  name: "SelbergMajorantMultiPrime"
  authors:
    - "Arij Aziz"
    id: "https://github.com/Arij-Aziz/Selberg_improvement_general"
  license: "Apache-2.0"

status:
  scope: >
    Six independent results about the multi-prime Selberg majorant
    ν(x) = (Σ_{d ∈ sqfDivisors(P), d | gcd(x,P)} λ_d)² on Fin(P·m),
    for arbitrary squarefree P = p₁·····pₖ and arbitrary Selberg weights λ.
    (1) Central L² identity: Σ_x ν(x) = (P·m)·Q(λ) for any λ, proved from
    counting. (2) Möbius weights minimize Q(λ); Q(μ_P) = φ(P)/P = 1/V(1/·,P,P).
    (3) Sharp mass–energy tradeoff: mass = N/V, ‖ν‖₂² ≥ |S|⁴·V²/N³ at Möbius
    weights; general form conditional on one deferred sorry.
    (4) Coprime-shift correlation identity for the unsquared weight, proved via
    CRT. (5) V-function kinetic stability under prime-level perturbation.
    (6) Quadratic form perturbation bound. Also includes: sharp Fourier ratio
    lower bound; correlation-enhanced additive energy lower bound for
    pseudorandom majorants; complete Selberg upper bound with general remainder;
    and a machine-verified disproof of the blueprint correlation bound.
    Does NOT cover the full Selberg sieve with arbitrary level D and general g
    (one sorry deferred), asymptotic results, or optimality in a broader
    function space. The Future/ directory is scaffolding only.
  sorry_count: 1
  sorry_in_definitions: 0
  sorry_locations:
    - declaration: optimalWeight_quadForm_eq
      file: RequestProject/Core/MultiPrime/OptimalWeights.lean
      reason: >
        Deferred Möbius inversion argument on the squarefree divisor lattice.
        Mathematically standard: Iwaniec–Kowalski eq. (6.70), Ford Theorem 4.1
        p. 44, JTNB_2006 eq. (8.2). Not a mathematical gap. The Möbius-weight
        case is fully proved via optimalWeight_quadForm_eq_moebius.
  axioms:
    - propext
    - Classical.choice
    - Quot.sound
  main_results:

    # ── §1. Multi-prime setup ─────────────────────────────────────────────

    - declaration: selbergNu_dominates
      file: RequestProject/Core/MultiPrime/Setup.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies:
        - statement: "Selberg majorant dominates the indicator function when λ₁ = 1"
          source: "Iwaniec–Kowalski, Analytic Number Theory, Ch. 6"

    - declaration: card_joint_multiples_of_lcm
      file: RequestProject/Core/MultiPrime/JointCount.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies: []

    # ── §2. Central Identity ──────────────────────────────────────────────

    - declaration: l2NormSq_multiPrime_eq_quadForm
      file: RequestProject/Core/MultiPrime/L2Identity.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies: []

    # ── §3. FourierRatio ──────────────────────────────────────────────────

    - declaration: multiPrime_mass_eq_quadForm
      file: RequestProject/Core/MultiPrime/FourierRatio.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies: []

    - declaration: multiPrime_quadForm_lower_bound
      file: RequestProject/Core/MultiPrime/FourierRatio.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies: []

    - declaration: multiPrime_restriction_lower_bound
      file: RequestProject/Core/MultiPrime/FourierRatio.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies:
        - statement: "Cauchy–Schwarz restriction lower bound for sieve majorants"
          source: "Mathlib: Finset.inner_mul_le_norm_mul_iff"

    # ── §4. Möbius weights and optimality ─────────────────────────────────

    - declaration: moebiusWeights_one
      file: RequestProject/Core/MultiPrime/MoebiusWeights.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies: []

    - declaration: moebius_quadForm_eq
      file: RequestProject/Core/MultiPrime/MoebiusWeights.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies:
        - statement: "Q(μ_P) = φ(P)/P for the Möbius weights on sqfDivisors(P)"
          source: "Iwaniec–Kowalski, Analytic Number Theory, Ch. 6; proved here
                   by induction on prime factors without Dirichlet series"

    - declaration: multiPrimeQuadForm_lower_bound'
      file: RequestProject/Core/MultiPrime/MoebiusWeights.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies: []

    - declaration: optimalWeight_quadForm_eq_moebius
      file: RequestProject/Core/MultiPrime/MoebiusWeights.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies:
        - statement: "Q(μ_P) = 1/V(1/·, P, P)"
          source: "Iwaniec–Kowalski eq. (6.70); Ford Theorem 4.1 p. 44;
                   JTNB_2006 eq. (8.2). Möbius-weight case only; proved
                   without the deferred sorry."

    - declaration: multiPrimeQuadForm_lower_bound_inv
      file: RequestProject/Core/MultiPrime/MoebiusWeights.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies: []

    # ── §5. Selberg upper bound and sharp L² bound ────────────────────────

    - declaration: selberg_upper_bound_multiPrime
      file: RequestProject/Core/MultiPrime/SelbergUpperBound.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies:
        - statement: "|S| ≤ X/V(D) + remainder for the Selberg sieve"
          source: "Iwaniec–Kowalski, Theorem 6.4; Ford, Theorem 4.1 p. 44"

    - declaration: selberg_l2_sharp
      file: RequestProject/Core/MultiPrime/SelbergUpperBound.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies: []

    # ── §6. Sharp mass–energy tradeoff ────────────────────────────────────

    - declaration: selberg_l2_lower_bound
      file: RequestProject/Core/MassEnergyTradeoff/SharpBounds.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies: []

    # ── §7. Coprime-shift correlation ─────────────────────────────────────

    - declaration: coprimePairsQuadForm_le_multiPrimeQuadForm
      file: RequestProject/Core/MultiPrime/SelbergWeightCorrelation.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies: []

    - declaration: selbergWeight_correlation_coprime_bound
      file: RequestProject/Core/MultiPrime/SelbergWeightCorrelation.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies:
        - statement: "Correlation bound for sieve weights via CRT"
          source: "Green–Tao 2007, Proposition 9.1 (inspiration only;
                   our result is for unsquared weights at coprime shifts,
                   not for the squared majorant at all shifts)"

    # ── §8. Additive energy lower bound ───────────────────────────────────

    - declaration: additiveEnergy_lower_bound
      file: RequestProject/Core/RestrictionLowerBound.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies: []

    - declaration: restriction_lower_bound
      file: RequestProject/Core/RestrictionLowerBound.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies:
        - statement: "Cauchy–Schwarz restriction lower bound (Majorant form)"
          source: "Mathlib: Finset.inner_mul_le_norm_mul_iff"

    - declaration: sieve_additive_energy_lower
      file: RequestProject/Core/RestrictionLowerBound.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      literature_dependencies: []

  additional_results:

    - declaration: selberg_unified_connection_moebius
      file: RequestProject/Core/ConditionalConnection.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      note: >
        Packages the full proof chain (mass = N/V and ‖ν‖₂² ≥ |S|⁴·V²/N³)
        for Möbius weights. Fully sorry-free. One-line proof.

    - declaration: selberg_unified_connection
      file: RequestProject/Core/ConditionalConnection.lean
      sorry_count: 1
      axioms: [propext, Classical.choice, Quot.sound, sorry]
      note: >
        General g and D. Conditional on optimalWeight_quadForm_eq (sorry).
        All other steps are proved.

    - declaration: selberg_upper_bound_complete
      file: RequestProject/Core/MultiPrime/RemainderBound.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      note: >
        Complete Selberg upper bound with general remainder function r.
        |{a ∈ [P·m] : gcd(a,P)=1}| ≤ (P·m)/V + moebiusRemainderBound(P,r).

    - declaration: selbergNu_correlation_bound_is_false
      file: RequestProject/Core/MultiPrime/SelbergCorrelationBoundDisproved.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      note: >
        Machine-verified disproof of the blueprint C1 correlation bound.
        Counterexample: P=2, m=2 (N=4), λ₁=λ₂=1, h=0.

    - declaration: sharp_fourier_ratio_lower_bound
      file: RequestProject/Core/MultiPrime/FourierRatioSharp.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      note: >
        ∃ ξ ≠ 0, |ν̂(ξ)|² ≥ (N·‖ν‖₂²−mass²)/(N−1). Opposite direction to
        Green–Tao 2006 Prop. 3.1(iv).

    - declaration: correlation_additive_energy_lower
      file: RequestProject/Core/CorrelationBound/AdditiveEnergyLower.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      note: >
        E(ν) ≥ N³·(1−2ε−4δ) for StrongPseudorandomMajorant.
        Instantiation for multiPrimeMajorant is a separate project.

    - declaration: kinetic_V_stability
      file: RequestProject/Core/KineticStability/VFunctionStability.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      note: >
        |V(g,P,D) − V(g',P,D)| controlled by prime-level perturbation.
        Parallel result; not in the proof chain of selberg_unified_connection.

    - declaration: multiPrimeQuadForm_perturbation
      file: RequestProject/Core/KineticStability/QuadFormPerturbation.lean
      sorry_count: 0
      axioms: [propext, Classical.choice, Quot.sound]
      note: >
        |Q(λ)−Q(μ)| ≤ 2C·Σδ_d/lcm(d,e). Engine: prod_perturb from
        KineticPropagation.lean.

