automation:
  methods:
    - method: agent
      models:
        - "Aristotle (primary)"
        - "gpt-5.4"
        - "gemini-3.1-pro"
        - "sonar"
        - "codex"
      framework: "Human-AI collaboration; Perplexity (Aristotle) as primary agent"
      tool_setup: >
        Lean 4 + Mathlib v4.28.0. Codex used for spot-checking only.
        All theorem statements and proof strategies decided by human author.
        AI assistance used for tactic search, proof elaboration, and
        infrastructure lemmas.
      cost:
        wall_time: "3 days"
        spend_usd: "$20"
        hardware: "API-only"
      prompting_notes: >
        Mathematical direction, theorem statements, novelty identification,
        and scope decisions were made by the human author. AI was used for
        tactic search and elaboration. All mathematical claims were verified
        by the human author via lake build and #print axioms.
  spend_usd: "$20"
  notes: >
    Human–AI collaboration. The human author drove all mathematical decisions.
    AI models assisted with proof search and infrastructure. Final verification
    done via lake build and Audit.lean (#print axioms). One sorry remains in
    optimalWeight_quadForm_eq_moebius pending full Möbius inversion argument.

fidelity:
  divergences: >
    (1) optimalWeight_quadForm_eq_moebius carries one sorry: the identity
    Q(λ_opt) = 1/V(D) requires a deep Möbius inversion argument on the
    lattice of squarefree divisors (Iwaniec–Kowalski eq. (6.70)–(6.71))
    that is deferred to a future milestone. All other 54 declarations are
    sorry-free.
    (2) The correlation-enhanced additive energy lower bound
    (correlation_additive_energy_lower) uses abstract pseudorandomness
    hypotheses; it is not instantiated for multiPrimeMajorant in the
    current scope.
    (3) No asymptotic results, no density estimates, no big-O or o().
    (4) selberg_upper_bound_multiPrime uses remainder = 0 as a placeholder;
    the full remainder term with nontrivial error control is not proved.
    (5) The Future/ directory contains scaffolding excluded from the axiom
    audit.

review:
  status: "agent-reviewed, self-assessed"
  reviewers:
    - "Arij Aziz (author)"
    - "Aristotle (AI agent)"
    - "Codex (AI agent)"
  notes: >
    All 55 declarations verified via #print axioms in RequestProject/Audit.lean.
    Axiom footprint confirmed as [propext, Classical.choice, Quot.sound] for
    every result. One sorry in optimalWeight_quadForm_eq_moebius (noted above).
    lake build passes cleanly on leanprover/lean4:v4.28.0 + Mathlib v4.28.0.
    Pending human peer review.

