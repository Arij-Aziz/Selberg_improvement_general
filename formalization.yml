  license: "Apache-2.0"

status:
  scope: >
    Multi-prime extension of the single-prime Selberg majorant results from
    Step 1. (1) Multi-prime L² identity: Σ_x ν(x) = N·Q(λ) for the
    multi-prime Selberg majorant on Fin(P·m). (2) FourierRatio: mass equals
    N·Q(λ), quadratic form lower bound, and restriction lower bound
    mass²·‖ν‖₂² ≥ |S|⁴/N. (3) Möbius weights: optimality Q(μ_P) = 1/V,
    and Q(λ) ≥ φ(P)/P. (4) Selberg upper bound |S| ≤ N/V + remainder and
    sharp L² bound ‖ν‖₂² ≥ |S|⁴·V²/N³ at Möbius weights. (5) Sharp
    mass–energy tradeoff ‖ν‖₂² ≥ |S|⁴/(N³·Q²). (6) Coprime-shift
    correlation bound Σ_x w(x)·w(x+h) ≤ N·Q(λ). (7) Additive energy lower
    bounds including correlation-enhanced E(ν) ≥ N³·(1−2ε−4δ). (8) Sharp
    Fourier ratio lower bound: existence of ξ≠0 with large |ν̂(ξ)|². (9)
    Quadratic form perturbation |Q(λ)−Q(μ)| ≤ 2C·Σ δ_d/lcm. Does NOT cover
    asymptotic results, the full Iwaniec–Kowalski sieve main term, or
    extremality beyond the Möbius weight case.
  sorry_count: 1
  sorry_in_definitions: 0
  axioms:
    - propext
    - Classical.choice
    - Quot.sound
  main_results:

    # ── Step 1 carry-overs (proved in prior project, re-verified here) ────────

